<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#5E6B7A">
  <link rel="manifest" href="/manifest.json?v=__APP_ASSET_VERSION__">
  <link rel="icon" href="/icons/icon-192.png?v=__APP_ASSET_VERSION__">
  <title>Crow Run</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/views.css">
</head>
<body>
  <div id="app">
    <header class="status-bar">
      <div class="status-bar__left">
        <span class="app-title">Crow Run</span>
      </div>
      <div class="status-bar__right">
        <span class="currency currency--seeds" id="status-seeds">
          <img src="/assets/named_selection_borderless_8x_cleaned_crow_toned/seeds.png?v=__APP_ASSET_VERSION__" alt="seeds" class="currency__icon">
          <span id="seeds-count">0</span>
        </span>
        <span class="currency currency--sticks" id="status-sticks">
          <img src="/assets/named_selection_borderless_8x_cleaned_crow_toned/stick_pair.png?v=__APP_ASSET_VERSION__" alt="sticks" class="currency__icon">
          <span id="sticks-count">0</span>
        </span>
        <span class="currency currency--steps" id="status-steps">
          <img src="/assets/bird_footsteps.png?v=__APP_ASSET_VERSION__" alt="steps" class="currency__icon">
          <span id="steps-count">0</span>
        </span>
      </div>
    </header>

    <main class="view-container" id="view-container">
    </main>

    <nav class="tab-bar" id="tab-bar">
      <a href="#home" class="tab-bar__tab" data-view="home">
        <svg class="tab-bar__icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Home</span>
      </a>
      <a href="#log" class="tab-bar__tab" data-view="log">
        <svg class="tab-bar__icon" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Log</span>
      </a>
      <a href="#hex" class="tab-bar__tab" data-view="hex">
        <svg class="tab-bar__icon" viewBox="0 0 24 24"><path d="M12 2l8 4.5v7L12 18l-8-4.5v-7L12 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <span>Map</span>
      </a>
      <a href="#records" class="tab-bar__tab" data-view="records">
        <svg class="tab-bar__icon" viewBox="0 0 24 24"><path d="M3 3v18h18M7 16l4-4 4 4 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Records</span>
      </a>
      <a href="#nest" class="tab-bar__tab" data-view="nest">
        <svg class="tab-bar__icon" viewBox="0 0 24 24"><path d="M12 3c-4 0-8 3-8 7 0 2 1 3 2 4h12c1-1 2-2 2-4 0-4-4-7-8-7z M6 14c0 4 2.7 7 6 7s6-3 6-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Nest</span>
      </a>
    </nav>
  </div>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      if (!params.has('birdReset') && !params.has('clearStorage') && !params.has('reset') && params.has('resetDone')) {
        const cleanUrl = new URL(window.location.href);
        cleanUrl.searchParams.delete('resetDone');
        window.history.replaceState({}, '', cleanUrl.toString());
      }
      const raw = params.get('birdReset') ?? params.get('clearStorage') ?? params.get('reset');
      if (!raw) return;

      const value = raw.trim().toLowerCase();
      if (!['1', 'true', 'yes', 'on', 'bird'].includes(value)) return;

      window.__BIRDCLAUDE_RESETTING__ = true;

      const showResetMessage = () => {
        const container = document.getElementById('view-container');
        if (container) {
          container.innerHTML = '<div style="padding:32px 20px;text-align:center;color:#5E6B7A;font:600 16px/1.4 system-ui,sans-serif">Clearing Crow Run local data…</div>';
        }
      };

      const clearCookies = () => {
        const cookies = document.cookie ? document.cookie.split(';') : [];
        for (const cookie of cookies) {
          const eq = cookie.indexOf('=');
          const name = (eq >= 0 ? cookie.slice(0, eq) : cookie).trim();
          if (!name) continue;
          document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
          document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=${window.location.hostname}`;
        }
      };

      const clearIndexedDb = async () => {
        if (!('indexedDB' in window) || typeof indexedDB.databases !== 'function') return;
        try {
          const databases = await indexedDB.databases();
          await Promise.all(databases.map((db) => db?.name
            ? new Promise((resolve) => {
                const req = indexedDB.deleteDatabase(db.name);
                req.onsuccess = req.onerror = req.onblocked = () => resolve();
              })
            : Promise.resolve()));
        } catch (_) {}
      };

      const clearCacheStorage = async () => {
        if (!('caches' in window)) return;
        try {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        } catch (_) {}
      };

      const clearServiceWorkers = async () => {
        if (!('serviceWorker' in navigator)) return;
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}
      };

      const clearSiteState = async () => {
        try { localStorage.clear(); } catch (_) {}
        try { sessionStorage.clear(); } catch (_) {}
        clearCookies();
        await Promise.allSettled([
          clearIndexedDb(),
          clearCacheStorage(),
          clearServiceWorkers(),
        ]);
      };

      showResetMessage();
      clearSiteState().finally(() => {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.delete('birdReset');
        nextUrl.searchParams.delete('clearStorage');
        nextUrl.searchParams.delete('reset');
        nextUrl.searchParams.set('resetDone', Date.now().toString());
        window.location.replace(nextUrl.toString());
      });
    })();
  </script>
  <script type="module">
    if (!window.__BIRDCLAUDE_RESETTING__) {
      import('./js/app.js');
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
